version: "2"

run:
  timeout: 5m
  go: "1.25"
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - bodyclose
    - errorlint
    - revive
    - nolintlint
  settings:
    govet:
      enable-all: true
      disable:
        - fieldalignment
    gosec:
      excludes:
        - G104
        - G115
    revive:
      rules:
        - name: var-naming
        - name: exported
          disabled: true
        - name: package-comments
        - name: indent-error-flow
        - name: superfluous-else
    errcheck:
      check-type-assertions: false
      check-blank: false
      exclude-functions:
        - (*github.com/jmoiron/sqlx.Tx).Rollback
        - fmt.Fprintln(os.Stderr)
        - fmt.Fprintf(os.Stderr)
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - bodyclose
      - path: cmd/
        linters:
          - revive

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
