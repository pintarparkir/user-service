# Generated artefacts: <file>.pb.go and <service>_grpc.pb.go alongside .proto.
version: v2

managed:
  enabled: true

plugins:
  - remote: buf.build/protocolbuffers/go:v1.34.1
    out: .
    opt:
      - paths=source_relative
  - remote: buf.build/grpc/go:v1.4.0
    out: .
    opt:
      - paths=source_relative
