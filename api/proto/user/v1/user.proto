syntax = "proto3";

package parkirpintar.user.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/farid/parkirpintar/api/proto/user/v1;userv1";

// UserStatus controls whether a user can transact.
enum UserStatus {
  USER_STATUS_UNSPECIFIED = 0;
  USER_STATUS_ACTIVE = 1;
  USER_STATUS_SUSPENDED = 2;
  USER_STATUS_DELETED = 3;
}

// VehicleType matches the vehicle_type Postgres enum used by the reservation service.
enum VehicleType {
  VEHICLE_TYPE_UNSPECIFIED = 0;
  VEHICLE_TYPE_CAR = 1;
  VEHICLE_TYPE_MOTORCYCLE = 2;
}

// User is the canonical driver profile record. PII fields (phone, email) are
// encrypted at rest by the repository layer.
message User {
  string id = 1;
  string external_user_id = 2;     // identity from super-app JWT
  string full_name = 3;
  string phone_e164 = 4;           // MSISDN — used for SMS notification
  string email = 5;
  UserStatus status = 6;
  int32 version = 7;
  google.protobuf.Timestamp created_at = 8;
  google.protobuf.Timestamp updated_at = 9;
}

// Vehicle is a registered license plate belonging to a driver.
message Vehicle {
  string id = 1;
  string driver_id = 2;
  string nopol = 3;                // e.g. "B1234ABC"
  VehicleType vehicle_type = 4;
  bool is_default = 5;
  google.protobuf.Timestamp created_at = 6;
}

// ── User RPCs ────────────────────────────────────────────────────────────────

message CreateUserRequest {
  string external_user_id = 1;
  string full_name = 2;
  string phone_e164 = 3;
  string email = 4;
}

// UpsertDriverRequest is called by the gateway on every incoming request.
// Creates the driver profile on first contact; returns existing on retry.
message UpsertDriverRequest {
  string phone_e164      = 1;  // MSISDN from JWT (required)
  string external_user_id = 2; // super-app identity (required)
  string full_name        = 3; // optional — updated when provided
}

message GetUserByIdRequest         { string id = 1; }
message GetUserByExternalIdRequest { string external_user_id = 1; }

message UpdateUserRequest {
  string id = 1;
  string full_name = 2;
  string phone_e164 = 3;
  string email = 4;
  int32  expected_version = 5;   // optimistic lock
}

message DeleteUserRequest  { string id = 1; }
message DeleteUserResponse { bool ok = 1; }

message ListUsersRequest {
  int32 limit = 1;               // default 50, max 200
  int32 offset = 2;
  UserStatus status_filter = 3;
}
message ListUsersResponse {
  repeated User users = 1;
  int32 total = 2;
}

// ── Vehicle RPCs ─────────────────────────────────────────────────────────────

message RegisterVehicleRequest {
  string driver_id    = 1;
  string nopol        = 2;   // e.g. "B 1234 ABC" — normalised server-side
  VehicleType vehicle_type = 3;
  bool   is_default   = 4;
}

message ListVehiclesRequest  { string driver_id = 1; }
message ListVehiclesResponse { repeated Vehicle vehicles = 1; }

// ── Payment Method RPCs ──────────────────────────────────────────────────────

message PaymentMethod {
  string type = 1;    // CC, QRIS, NONE
  string cc_token = 2;
  string last4 = 3;
  string brand = 4;
}

message GetDefaultPaymentMethodRequest { string user_id = 1; }

// ── Payment Method RPCs ──────────────────────────────────────────────────────

message PaymentMethodResponse {
  string type = 1;    // "CC", "QRIS", "NONE"
  string last4 = 2;   // Last 4 digits of card number (if CC)
  string brand = 3;   // Card brand (e.g., "VISA", "MASTERCARD")
}

message GetDefaultPaymentMethodRequest { string user_id = 1; }

// ── Service ──────────────────────────────────────────────────────────────────

service UserService {
  // CreateUser is idempotent on (external_user_id).
  rpc CreateUser(CreateUserRequest)                    returns (User);
  // UpsertDriver is the gateway lazy-registration call, idempotent on MSISDN.
  rpc UpsertDriver(UpsertDriverRequest)                returns (User);
  rpc GetUserById(GetUserByIdRequest)                  returns (User);
  rpc GetUserByExternalId(GetUserByExternalIdRequest)  returns (User);
  rpc UpdateUser(UpdateUserRequest)                    returns (User);
  rpc DeleteUser(DeleteUserRequest)                    returns (DeleteUserResponse);
  rpc ListUsers(ListUsersRequest)                      returns (ListUsersResponse);

  // RegisterVehicle is idempotent on (driver_id, nopol).
  rpc RegisterVehicle(RegisterVehicleRequest)          returns (Vehicle);
  rpc ListVehicles(ListVehiclesRequest)                returns (ListVehiclesResponse);

  // GetDefaultPaymentMethod returns the user's default payment method (gRPC only).
  rpc GetDefaultPaymentMethod(GetDefaultPaymentMethodRequest) returns (PaymentMethodResponse);
}
