name: user-service CD

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  GO_VERSION: '1.25.10'
  GCP_PROJECT_ID: pintarparkir
  GCP_REGION: asia-southeast1
  AR_REGION: asia-southeast2
  SERVICE_NAME: user-service
  ARTIFACT_REGISTRY_REPO: parkirpintar

jobs:
  build-and-push:
    name: Build & push to Artifact Registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v4

      - id: image
        run: |
          IMAGE="${{ env.AR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          echo "uri=$IMAGE" >> "$GITHUB_OUTPUT"

      - uses: google-github-actions/auth@v2
        id: auth
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - uses: google-github-actions/setup-gcloud@v2

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AR_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.AR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
            ${{ env.AR_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.SERVICE_NAME }}:latest
          build-args: SERVICE=user
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Cloud Run
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.WIF_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ needs.build-and-push.outputs.image }}
          region: ${{ env.GCP_REGION }}
          env_vars: |
            PROJECT_ENV=production
            APP_PORT=8080
            APP_NAME=user-service
            APP_ENV=production
            OTLP_ENDPOINT=
            DB_HOST=/cloudsql/pintarparkir:asia-southeast1:parkirpintar-db-dev
            DB_PORT=5432
            DB_USERNAME=parking_pool_user
            DB_NAME=parkirpintar
            REDIS_HOST=10.39.1.3
            REDIS_PORT=6379
            REDIS_DB=1
            REDIS_APP_CONFIG=user-service
          secrets: |
            DB_PASSWORD=db-password:latest
            REDIS_PASSWORD=redis-password:latest
            SUPER_APP_JWT_PUBLIC_KEY_PEM=jwt-public-key:latest
            PG_CRYPTO_KEY=pg-crypto-key:latest
          flags: >-
            --port=8080
            --allow-unauthenticated
            --min-instances=1
            --max-instances=3
            --memory=512Mi
            --cpu=1
            --timeout=300
            --no-use-http2
            --add-cloudsql-instances=pintarparkir:asia-southeast1:parkirpintar-db-dev
            --vpc-connector=projects/pintarparkir/locations/asia-southeast1/connectors/parkirpintar-connector

      - name: Smoke test
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region=${{ env.GCP_REGION }} \
            --format='value(status.url)')
          echo "Service URL: $URL"
          for i in 1 2 3 4 5; do
            if curl -fsS --max-time 10 "$URL/health"; then
              echo "✓ smoke test passed"
              exit 0
            fi
            echo "attempt $i failed; retrying in 10s"
            sleep 10
          done
          echo "::warning::smoke probe failed - service may still be starting"
          exit 0
