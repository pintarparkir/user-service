name: user-service CI

on:
  pull_request:
  push:
    branches: [main]

# Per-job permissions (SonarCloud: workflow-level permissions are a hotspot).

env:
  GO_VERSION: '1.25.10'
  GOLANGCI_LINT_VERSION: v2.12.2

jobs:
  lint:
    name: Lint & vet
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go vet
        run: go vet ./...
      - name: gofmt
        run: |
          unformatted=$(gofmt -s -l .)
          if [ -n "$unformatted" ]; then
            echo "::error::Files need gofmt -s -w:"
            echo "$unformatted"
            exit 1
          fi
      - name: golangci-lint
        uses: golangci/golangci-lint-action@9fae48acfc02a90574d7c304a1758ef9895495fa
        with:
          version: ${{ env.GOLANGCI_LINT_VERSION }}
          args: --timeout=5m
      - name: go mod tidy drift check
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "::error::go.mod / go.sum drifted. Run 'go mod tidy' and commit."
            exit 1
          fi

  test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: go test (race + coverage)
        run: go test -race -coverprofile=coverage.out -covermode=atomic ./...
      - name: Coverage by package
        run: go tool cover -func=coverage.out | tee coverage.txt
      - name: Coverage gate (warn-only — flip to blocking after T-008 ships)
        run: |
          set +e
          fail=0
          # usecase ≥ 80%
          usecase_avg=$(awk '/internal\/.+\/usecase\/.+\.go/ && !/_test\.go/ {gsub("%","",$3); sum+=$3; n++} END { if (n>0) printf "%.1f", sum/n; else print "" }' coverage.txt)
          if [ -n "$usecase_avg" ]; then
            below=$(awk -v c="$usecase_avg" 'BEGIN { print (c+0 < 80) }')
            if [ "$below" = "1" ]; then
              echo "::warning::usecase coverage $usecase_avg% < 80% target"
            else
              echo "usecase coverage OK ($usecase_avg%)"
            fi
          fi
          # repo ≥ 60%
          repo_avg=$(awk '/internal\/.+\/repository\/.+\.go/ && !/_test\.go/ {gsub("%","",$3); sum+=$3; n++} END { if (n>0) printf "%.1f", sum/n; else print "" }' coverage.txt)
          if [ -n "$repo_avg" ]; then
            below=$(awk -v c="$repo_avg" 'BEGIN { print (c+0 < 60) }')
            if [ "$below" = "1" ]; then
              echo "::warning::repository coverage $repo_avg% < 60% target"
            else
              echo "repository coverage OK ($repo_avg%)"
            fi
          fi
          exit 0
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage
          path: |
            coverage.out
            coverage.txt
          retention-days: 7

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./...

  build:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f
      - name: Build image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8
        with:
          context: .
          push: false
          tags: ${{ github.event.repository.name }}:${{ github.sha }}
          build-args: SERVICE=user
          cache-from: type=gha
          cache-to: type=gha,mode=max
