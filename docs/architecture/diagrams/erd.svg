<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850" font-family="Inter, system-ui, sans-serif" font-size="11">
  <defs>
    <marker id="one" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,2 L0,10 M0,6 L10,6" stroke="#475569" stroke-width="1.5" fill="none"/>
    </marker>
    <marker id="many" viewBox="0 0 12 12" refX="11" refY="6" markerWidth="10" markerHeight="10" orient="auto">
      <path d="M0,2 L10,6 L0,10 M0,6 L10,6" stroke="#475569" stroke-width="1.5" fill="none"/>
    </marker>
  </defs>

  <text x="600" y="30" text-anchor="middle" font-size="22" font-weight="700" fill="#0f172a">ParkirPintar — Entity Relationship Diagram</text>
  <text x="600" y="50" text-anchor="middle" font-size="12" fill="#475569">PostgreSQL 16 — see data/init.sql for DDL · ADR-004 for EXCLUDE constraint</text>

  <!-- DRIVER -->
  <g transform="translate(60,90)">
    <rect width="220" height="120" rx="6" fill="#fff" stroke="#1e3a8a" stroke-width="1.5"/>
    <rect width="220" height="26" rx="6" fill="#1e3a8a"/>
    <text x="110" y="18" text-anchor="middle" font-weight="700" fill="white">DRIVER</text>
    <text x="10" y="44" font-weight="600">PK</text><text x="38" y="44">id : uuid</text>
    <text x="10" y="62" font-weight="600">UK</text><text x="38" y="62">external_user_id</text>
    <text x="38" y="80">phone_e164_enc : bytea</text>
    <text x="38" y="98">created_at : timestamptz</text>
  </g>

  <!-- SPOT -->
  <g transform="translate(60,260)">
    <rect width="220" height="130" rx="6" fill="#fff" stroke="#0e7490" stroke-width="1.5"/>
    <rect width="220" height="26" rx="6" fill="#0e7490"/>
    <text x="110" y="18" text-anchor="middle" font-weight="700" fill="white">SPOT</text>
    <text x="10" y="44" font-weight="600">PK</text><text x="38" y="44">id : text  (e.g. F2-C-014)</text>
    <text x="38" y="62">floor : smallint (1..5)</text>
    <text x="38" y="80">vehicle_type : enum</text>
    <text x="38" y="98">status : enum</text>
    <text x="38" y="116">version : int</text>
  </g>

  <!-- RESERVATION -->
  <g transform="translate(360,90)">
    <rect width="280" height="280" rx="6" fill="#fff" stroke="#7c2d12" stroke-width="1.5"/>
    <rect width="280" height="26" rx="6" fill="#7c2d12"/>
    <text x="140" y="18" text-anchor="middle" font-weight="700" fill="white">RESERVATION</text>
    <text x="10" y="44" font-weight="600">PK</text><text x="38" y="44">id : uuid</text>
    <text x="10" y="62" font-weight="600">FK</text><text x="38" y="62">driver_id</text>
    <text x="10" y="80" font-weight="600">FK</text><text x="38" y="80">spot_id → SPOT.id</text>
    <text x="38" y="98">vehicle_type : enum</text>
    <text x="38" y="116">state : enum</text>
    <text x="38" y="134">hold_window : tstzrange ⚠ EXCLUDE</text>
    <text x="38" y="152">hold_start / hold_end</text>
    <text x="38" y="170">confirmed_at, checked_in_at,</text>
    <text x="38" y="188">checked_out_at, expires_at</text>
    <text x="10" y="206" font-weight="600">UK</text><text x="38" y="206">idempotency_key</text>
    <text x="38" y="224">version : int</text>
    <text x="38" y="242">created_at, updated_at</text>
    <text x="38" y="262" fill="#7c2d12" font-weight="600">EXCLUDE (spot_id, hold_window) WHERE</text>
    <text x="38" y="276" fill="#7c2d12" font-weight="600">state IN (CONFIRMED,ACTIVE)</text>
  </g>

  <!-- INVOICE -->
  <g transform="translate(720,90)">
    <rect width="240" height="180" rx="6" fill="#fff" stroke="#166534" stroke-width="1.5"/>
    <rect width="240" height="26" rx="6" fill="#166534"/>
    <text x="120" y="18" text-anchor="middle" font-weight="700" fill="white">INVOICE</text>
    <text x="10" y="44" font-weight="600">PK</text><text x="38" y="44">id : uuid</text>
    <text x="10" y="62" font-weight="600">FK,UK</text><text x="58" y="62">reservation_id</text>
    <text x="38" y="80">status : enum</text>
    <text x="38" y="98">total_idr : bigint</text>
    <text x="10" y="116" font-weight="600">UK</text><text x="38" y="116">idempotency_key</text>
    <text x="38" y="134">created_at, closed_at, paid_at</text>
  </g>

  <!-- INVOICE_LINE -->
  <g transform="translate(720,310)">
    <rect width="240" height="170" rx="6" fill="#fff" stroke="#166534" stroke-width="1.5"/>
    <rect width="240" height="26" rx="6" fill="#166534"/>
    <text x="120" y="18" text-anchor="middle" font-weight="700" fill="white">INVOICE_LINE</text>
    <text x="10" y="44" font-weight="600">PK</text><text x="38" y="44">id : uuid</text>
    <text x="10" y="62" font-weight="600">FK</text><text x="38" y="62">invoice_id</text>
    <text x="38" y="80">kind : enum</text>
    <text x="38" y="98">  (BOOKING/HOURLY/OVERNIGHT/</text>
    <text x="38" y="115">   CANCELLATION/NOSHOW)</text>
    <text x="38" y="133">amount_idr : bigint</text>
    <text x="38" y="151">note, created_at</text>
  </g>

  <!-- PAYMENT -->
  <g transform="translate(720,520)">
    <rect width="240" height="170" rx="6" fill="#fff" stroke="#9d174d" stroke-width="1.5"/>
    <rect width="240" height="26" rx="6" fill="#9d174d"/>
    <text x="120" y="18" text-anchor="middle" font-weight="700" fill="white">PAYMENT</text>
    <text x="10" y="44" font-weight="600">PK</text><text x="38" y="44">id : uuid</text>
    <text x="10" y="62" font-weight="600">FK</text><text x="38" y="62">invoice_id</text>
    <text x="38" y="80">method : 'QRIS'</text>
    <text x="38" y="98">status : enum</text>
    <text x="10" y="116" font-weight="600">UK</text><text x="38" y="116">pg_reference</text>
    <text x="38" y="134">amount_idr</text>
    <text x="38" y="152">created_at, paid_at</text>
  </g>

  <!-- OUTBOX -->
  <g transform="translate(360,420)">
    <rect width="280" height="160" rx="6" fill="#fff" stroke="#475569" stroke-width="1.5"/>
    <rect width="280" height="26" rx="6" fill="#475569"/>
    <text x="140" y="18" text-anchor="middle" font-weight="700" fill="white">OUTBOX_EVENT</text>
    <text x="10" y="44" font-weight="600">PK</text><text x="38" y="44">id : uuid</text>
    <text x="38" y="62">aggregate_type, aggregate_id</text>
    <text x="38" y="80">event_type</text>
    <text x="38" y="98">payload : bytea</text>
    <text x="38" y="116">created_at</text>
    <text x="38" y="134">published_at (NULL = pending)</text>
  </g>

  <!-- IDEMPOTENCY_KEY -->
  <g transform="translate(60,460)">
    <rect width="240" height="160" rx="6" fill="#fff" stroke="#475569" stroke-width="1.5"/>
    <rect width="240" height="26" rx="6" fill="#475569"/>
    <text x="120" y="18" text-anchor="middle" font-weight="700" fill="white">IDEMPOTENCY_KEY</text>
    <text x="10" y="44" font-weight="600">PK</text><text x="38" y="44">scope, key</text>
    <text x="38" y="62">response_payload : bytea</text>
    <text x="38" y="80">status_code</text>
    <text x="38" y="98">created_at</text>
    <text x="38" y="116">expires_at (TTL 24h)</text>
  </g>

  <!-- RESERVATION_EVENT -->
  <g transform="translate(360,640)">
    <rect width="280" height="120" rx="6" fill="#fff" stroke="#475569" stroke-width="1.5"/>
    <rect width="280" height="26" rx="6" fill="#475569"/>
    <text x="140" y="18" text-anchor="middle" font-weight="700" fill="white">RESERVATION_EVENT (audit)</text>
    <text x="10" y="44" font-weight="600">PK</text><text x="38" y="44">id : uuid</text>
    <text x="10" y="62" font-weight="600">FK</text><text x="38" y="62">reservation_id</text>
    <text x="38" y="80">event_type, payload : jsonb</text>
    <text x="38" y="98">occurred_at</text>
  </g>

  <!-- Relations -->
  <line x1="280" y1="150" x2="360" y2="150" stroke="#475569" stroke-width="1.5" marker-end="url(#many)" marker-start="url(#one)"/>
  <text x="320" y="142" text-anchor="middle" font-size="10" fill="#475569">makes</text>

  <line x1="280" y1="320" x2="360" y2="200" stroke="#475569" stroke-width="1.5" marker-end="url(#many)" marker-start="url(#one)"/>
  <text x="332" y="280" text-anchor="middle" font-size="10" fill="#475569">assigned_to</text>

  <line x1="640" y1="150" x2="720" y2="150" stroke="#475569" stroke-width="1.5" marker-end="url(#one)" marker-start="url(#one)"/>
  <text x="680" y="142" text-anchor="middle" font-size="10" fill="#475569">generates</text>

  <line x1="840" y1="270" x2="840" y2="310" stroke="#475569" stroke-width="1.5" marker-end="url(#many)" marker-start="url(#one)"/>
  <text x="850" y="293" font-size="10" fill="#475569">contains</text>

  <line x1="840" y1="480" x2="840" y2="520" stroke="#475569" stroke-width="1.5" marker-end="url(#many)" marker-start="url(#one)"/>
  <text x="850" y="503" font-size="10" fill="#475569">settled_by</text>

  <line x1="500" y1="370" x2="500" y2="420" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#many)"/>
  <text x="510" y="395" font-size="10" fill="#475569">references</text>

  <line x1="500" y1="580" x2="500" y2="640" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#many)"/>
  <text x="510" y="615" font-size="10" fill="#475569">audits</text>

  <text x="600" y="820" text-anchor="middle" font-size="11" fill="#64748b">PK = primary key · UK = unique key · FK = foreign key · double bar = one · trident = many</text>
</svg>
